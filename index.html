<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List — Desafio IA</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #4facfe, #00f2fe); min-height: 100vh; color: #333; }
    .topo { text-align: center; padding: 20px; color: white; }
    .container { max-width: 600px; margin: 30px auto; padding: 10px; }
    .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
    input, select { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; }
    input:focus, select:focus { border-color: #4facfe; }
    button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #4facfe; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #3a8dde; transform: scale(1.02); }
    ul { list-style: none; margin-top: 10px; }
    li { background: #f7f7f7; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    footer { text-align: center; padding: 15px; color: white; font-size: 14px; }
  </style>
</head>

<body>
  <header class="topo">
    <h1>📝 Minha Lista de Tarefas</h1>
  </header>

  <main class="container">
    <section class="card formulario">
      <div class="input-group">
        <input type="text" id="campo-tarefa" placeholder="Digite sua tarefa..." maxlength="100">
        <select id="seletor-prioridade">
          <option value="">Prioridade</option>
          <option value="alta">🔴 Alta</option>
          <option value="media">🟡 Média</option>
          <option value="baixa">🟢 Baixa</option>
        </select>
      </div>
      <button id="btn-adicionar">+ Adicionar</button>
    </section>

    <section class="card lista-container">
      <h2>📌 Tarefas</h2>
      <ul id="lista-tarefas"></ul>
    </section>
  </main>

  <footer>
    <p>Desenvolvido com Engenharia de Prompt</p>
  </footer>
</body>
</html>
