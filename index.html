<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow PRO+</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: white;
}

.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI'; }

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  max-width: 800px;
  margin: 30px auto;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
}

li {
  background: #334155;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

/* PRIORIDADE */
.alta { border-left: 5px solid red; }
.media { border-left: 5px solid orange; }
.baixa { border-left: 5px solid green; }

/* URGÊNCIA */
.atrasada { border-left: 5px solid crimson; }
.hoje { border-left: 5px solid orange; }
.proxima { border-left: 5px solid gold; }
.normal { border-left: 5px solid green; }

.concluida { opacity: 0.5; text-decoration: line-through; }

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="login">
    <h2>🔐 Login</h2>
    <input id="user" placeholder="Digite seu nome">
    <button onclick="login()">Entrar</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <div class="card">
      <div class="top-bar">
        <h2 id="welcome"></h2>
        <div>
          🕒 <span id="clock"></span>
          <button onclick="toggleTheme()">🌙</button>
        </div>
      </div>

      <input id="taskInput" placeholder="Nova tarefa">
      <input type="date" id="date">

      <select id="priority">
        <option value="baixa">Baixa</option>
        <option value="media">Média</option>
        <option value="alta">Alta</option>
      </select>

      <button onclick="addTask()">Adicionar</button>

      <input id="search" placeholder="🔍 Buscar..." oninput="render()">

      <p id="stats"></p>
    </div>

    <div class="card">
      <button onclick="setFilter('all')">Todas</button>
      <button onclick="setFilter('active')">Ativas</button>
      <button onclick="setFilter('done')">Concluídas</button>

      <ul id="list"></ul>

      <div style="margin-top:10px;">
        <button onclick="prevPage()">⬅</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">➡</button>
      </div>
    </div>

  </div>

</div>

<script>
let user = localStorage.getItem("user");
let tasks = JSON.parse(localStorage.getItem("tasks_"+user)) || [];
let filter = "all";

let currentPage = 1;
const perPage = 5;

let theme = localStorage.getItem("theme") || "dark";
if(theme === "light") document.body.classList.add("light");

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

if(user){
  startApp();
}

function toggleTheme(){
  document.body.classList.toggle("light");
  theme = document.body.classList.contains("light") ? "light" : "dark";
  localStorage.setItem("theme", theme);
}

function login(){
  user = document.getElementById("user").value;
  if(!user) return;

  localStorage.setItem("user", user);
  tasks = JSON.parse(localStorage.getItem("tasks_"+user)) || [];
  startApp();
}

function startApp(){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "👋 Olá, " + user;
  render();
}

function save(){
  localStorage.setItem("tasks_"+user, JSON.stringify(tasks));
}

function addTask(){
  let text = document.getElementById("taskInput").value;
  let priority = document.getElementById("priority").value;
  let date = document.getElementById("date").value;

  if(!text) return;

  tasks.push({
    id: Date.now(),
    text,
    priority,
    date,
    done: false
  });

  document.getElementById("taskInput").value = "";
  save();
  render();
}

// 🔥 URGÊNCIA
function getUrgency(date){
  if(!date) return {label:"🟢 OK", class:"normal", weight:3};

  let today = new Date();
  let taskDate = new Date(date);

  today.setHours(0,0,0,0);
  taskDate.setHours(0,0,0,0);

  let diff = (taskDate - today) / (1000 * 60 * 60 * 24);

  if(diff < 0) return {label:"🔴 ATRASADA", class:"atrasada", weight:0};
  if(diff === 0) return {label:"🟠 HOJE", class:"hoje", weight:1};
  if(diff <= 2) return {label:"🟡 EM BREVE", class:"proxima", weight:2};

  return {label:"🟢 OK", class:"normal", weight:3};
}

function toggle(id){
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  save();
  render();
}

function removeTask(id){
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function setFilter(f){
  filter = f;
  currentPage = 1;
  render();
}

function render(){
  let list = document.getElementById("list");
  let search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  let filtered = tasks.filter(t => {
    if(filter === "active") return !t.done;
    if(filter === "done") return t.done;
    return true;
  }).filter(t => t.text.toLowerCase().includes(search));

  // 🔥 ORDENAÇÃO POR URGÊNCIA
  filtered.sort((a,b)=>{
    let ua = getUrgency(a.date).weight;
    let ub = getUrgency(b.date).weight;
    return ua - ub;
  });

  // PAGINAÇÃO
  let totalPages = Math.ceil(filtered.length / perPage);
  let start = (currentPage - 1) * perPage;
  let paginated = filtered.slice(start, start + perPage);

  document.getElementById("pageInfo").innerText =
    `Página ${currentPage} / ${totalPages || 1}`;

  let done = tasks.filter(t => t.done).length;
  document.getElementById("stats").innerText =
    `Total: ${tasks.length} | Concluídas: ${done}`;

  paginated.forEach(t => {
    let li = document.createElement("li");

    let urgency = getUrgency(t.date);

    li.className = t.priority + " " + urgency.class + (t.done ? " concluida" : "");

    li.innerHTML = `
      <span onclick="toggle(${t.id})">
        ${t.text} <br>
        ${t.date ? "📅 " + t.date : ""} 
        <strong>${urgency.label}</strong>
      </span>
      <button onclick="removeTask(${t.id})">🗑</button>
    `;

    list.appendChild(li);
  });
}

function nextPage(){
  currentPage++;
  render();
}

function prevPage(){
  if(currentPage > 1){
    currentPage--;
    render();
  }
}
</script>

</body>
</html>
