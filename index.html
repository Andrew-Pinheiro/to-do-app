<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Startup</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI'; }

body {
  background: #0f172a;
  color: white;
}

.container {
  max-width: 800px;
  margin: 30px auto;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* INPUT */
input, select {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

/* BUTTON */
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
}

/* LIST */
li {
  background: #334155;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

/* PRIORIDADE */
.alta { border-left: 5px solid red; }
.media { border-left: 5px solid orange; }
.baixa { border-left: 5px solid green; }

.concluida { opacity: 0.5; text-decoration: line-through; }
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="login">
    <h2>🔐 Login</h2>
    <input id="user" placeholder="Digite seu nome">
    <button onclick="login()">Entrar</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <div class="card">
      <h2 id="welcome"></h2>

      <input id="taskInput" placeholder="Nova tarefa">
      <select id="priority">
        <option value="baixa">Baixa</option>
        <option value="media">Média</option>
        <option value="alta">Alta</option>
      </select>

      <button onclick="addTask()">Adicionar</button>

      <input id="search" placeholder="🔍 Buscar..." oninput="render()">

      <p id="stats"></p>
    </div>

    <div class="card">
      <button onclick="setFilter('all')">Todas</button>
      <button onclick="setFilter('active')">Ativas</button>
      <button onclick="setFilter('done')">Concluídas</button>

      <ul id="list"></ul>
    </div>

  </div>

</div>

<script>
let user = localStorage.getItem("user");
let tasks = JSON.parse(localStorage.getItem("tasks_"+user)) || [];
let filter = "all";

if(user){
  startApp();
}

function login(){
  user = document.getElementById("user").value;
  if(!user) return;

  localStorage.setItem("user", user);
  tasks = JSON.parse(localStorage.getItem("tasks_"+user)) || [];
  startApp();
}

function startApp(){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "👋 Olá, " + user;
  render();
}

function save(){
  localStorage.setItem("tasks_"+user, JSON.stringify(tasks));
}

function addTask(){
  let text = document.getElementById("taskInput").value;
  let priority = document.getElementById("priority").value;

  if(!text) return;

  tasks.push({
    id: Date.now(),
    text,
    priority,
    done: false
  });

  document.getElementById("taskInput").value = "";
  save();
  render();
}

function toggle(id){
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  save();
  render();
}

function removeTask(id){
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function setFilter(f){
  filter = f;
  render();
}

function render(){
  let list = document.getElementById("list");
  let search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  let filtered = tasks.filter(t => {
    if(filter === "active") return !t.done;
    if(filter === "done") return t.done;
    return true;
  }).filter(t => t.text.toLowerCase().includes(search));

  let done = tasks.filter(t => t.done).length;
  document.getElementById("stats").innerText =
    `Total: ${tasks.length} | Concluídas: ${done}`;

  filtered.forEach(t => {
    let li = document.createElement("li");
    li.className = t.priority + (t.done ? " concluida" : "");

    li.innerHTML = `
      <span onclick="toggle(${t.id})">${t.text}</span>
      <button onclick="removeTask(${t.id})">🗑</button>
    `;

    list.appendChild(li);
  });
}
</script>

</body>
</html>
